<main class="splash">
  <div class="splash-grid"></div>
  <div class="orb orb-one"></div>
  <div class="orb orb-two"></div>
  <div class="splash-discount-rain" aria-hidden="true">
    <span><app-icon name="badge-percent" [size]="22" /></span>
    <span><app-icon name="ticket-percent" [size]="26" /></span>
    <span><app-icon name="trending-down" [size]="20" /></span>
    <span><app-icon name="badge-percent" [size]="30" /></span>
    <span><app-icon name="ticket-percent" [size]="20" /></span>
    <span><app-icon name="trending-down" [size]="25" /></span>
    <span><app-icon name="badge-percent" [size]="19" /></span>
    <span><app-icon name="ticket-percent" [size]="28" /></span>
    <span><app-icon name="trending-down" [size]="21" /></span>
    <span><app-icon name="badge-percent" [size]="24" /></span>
    <span><app-icon name="ticket-percent" [size]="18" /></span>
    <span><app-icon name="trending-down" [size]="27" /></span>
  </div>
  <section>
    <img class="splash-logo" src="assets/logo.svg" alt="CyberDrops" />
    <p class="eyebrow">BEM-VINDO AO DROP</p>
    <p>
      As melhores promoções gamer, descobertas pela comunidade em tempo real.
    </p>
    <a class="button primary wide" routerLink="/login"
      >Começar <app-icon name="arrow-right" [size]="20" /></a
    ><small>Economize. Jogue. Compartilhe.</small>
  </section>
</main>
