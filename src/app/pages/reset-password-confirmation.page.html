<main class="auth-page">
  <section class="auth-card recovery-card recovery-confirmation">
    <div class="auth-feature-icon success">
      <app-icon name="mail-check" [size]="32" />
    </div>
    <div class="center">
      <p class="eyebrow">INSTRUÇÕES ENVIADAS</p>
      <h1>Confira seu e-mail</h1>
      <p class="muted">
        Enviamos as instruções para redefinir sua senha no e-mail informado.
      </p>
      <strong class="recovery-email">{{ email }}</strong>
    </div>
    <app-auth-feedback-message
      message="Para esta demonstração, você pode avançar diretamente para a criação da nova senha."
      type="info"
    />
    @if (feedback()) {
    <app-auth-feedback-message [message]="feedback()" type="success" />
    }
    <a class="button primary wide" routerLink="/create-new-password">
      <app-icon name="key-round" [size]="18" />
      Criar nova senha
    </a>
    <button
      class="button secondary wide"
      type="button"
      [disabled]="loading() || cooldown() > 0"
      (click)="resend()"
    >
      @if (loading()) {
      <app-icon class="auth-spinner" name="loader-circle" [size]="18" />
      Enviando novamente } @else {
      <app-icon name="refresh-cw" [size]="18" />
      {{ cooldown() > 0 ? "Enviar novamente em " + cooldown() + "s" : "Enviar
      novamente" }} }
    </button>
    <a class="auth-inline-link" routerLink="/login">
      <app-icon name="arrow-left" [size]="15" />
      Voltar para login
    </a>
  </section>
</main>
