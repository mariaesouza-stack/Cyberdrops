<section class="page avatar-page">
  <a class="back" routerLink="/profile" aria-label="Voltar"
    ><app-icon name="arrow-left" [size]="20"
  /></a>
  <p class="eyebrow">IDENTIDADE VISUAL</p>
  <h1>Escolha seu avatar cyber</h1>
  <p class="muted">Mostre seu estilo para a comunidade.</p>
  <div class="avatar-preview avatar">
    <app-avatar [src]="selected()" alt="Prévia do avatar cyber" />
  </div>
  <app-avatar-picker
    [selected]="selected()"
    (picked)="selected.set($event)"
  /><button class="button primary wide" (click)="save()">Salvar avatar</button>
</section>
