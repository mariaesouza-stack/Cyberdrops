<main class="auth-page">
  <a class="back" routerLink="/login" aria-label="Voltar para login">
    <app-icon name="arrow-left" [size]="20" />
  </a>
  <section class="auth-card recovery-card">
    <div class="auth-feature-icon">
      <app-icon name="key-round" [size]="30" />
    </div>
    <div>
      <p class="eyebrow">RECUPERAÇÃO DE ACESSO</p>
      <h1>Recuperar senha</h1>
      <p class="muted">
        Informe o e-mail cadastrado para receber as instruções de recuperação.
      </p>
    </div>
    <form (ngSubmit)="submit()">
      <label>
        E-mail cadastrado
        <input
          required
          name="email"
          type="email"
          [(ngModel)]="email"
          placeholder="voce@email.com"
        />
      </label>
      <p class="auth-security-note">
        <app-icon name="shield-check" [size]="16" />
        <span>
          Por segurança, enviaremos as instruções apenas se o e-mail estiver
          cadastrado.
        </span>
      </p>
      @if (feedback()) {
      <app-auth-feedback-message [message]="feedback()" type="error" />
      }
      <button class="button primary wide" [disabled]="loading()">
        @if (loading()) {
        <app-icon class="auth-spinner" name="loader-circle" [size]="18" />
        Enviando instruções } @else {
        <app-icon name="mail" [size]="18" />
        Enviar instruções }
      </button>
    </form>
    <a class="auth-inline-link" routerLink="/login">
      <app-icon name="arrow-left" [size]="15" />
      Voltar para login
    </a>
  </section>
</main>
