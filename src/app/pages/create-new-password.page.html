<main class="auth-page">
  <a class="back" routerLink="/reset-password-confirmation" aria-label="Voltar">
    <app-icon name="arrow-left" [size]="20" />
  </a>
  <section class="auth-card recovery-card">
    <div class="auth-feature-icon">
      <app-icon name="lock-keyhole" [size]="30" />
    </div>
    <div>
      <p class="eyebrow">NOVO ACESSO</p>
      <h1>Crie uma nova senha</h1>
      <p class="muted">
        Utilize pelo menos 8 caracteres, incluindo uma letra e um número.
      </p>
    </div>
    @if (success()) {
    <div class="password-reset-success">
      <app-icon name="shield-check" [size]="34" />
      <b>Senha alterada com sucesso.</b>
      <span>Você será redirecionado para o login.</span>
    </div>
    } @else {
    <form (ngSubmit)="submit()">
      <label>
        Nova senha
        <input
          required
          name="password"
          type="password"
          [(ngModel)]="password"
          placeholder="Digite sua nova senha"
        />
      </label>
      <label>
        Confirmar nova senha
        <input
          required
          name="confirmation"
          type="password"
          [(ngModel)]="confirmation"
          placeholder="Repita sua nova senha"
        />
      </label>
      @if (feedback()) {
      <app-auth-feedback-message [message]="feedback()" type="error" />
      }
      <button class="button primary wide" [disabled]="loading()">
        @if (loading()) {
        <app-icon class="auth-spinner" name="loader-circle" [size]="18" />
        Atualizando senha } @else {
        <app-icon name="shield-check" [size]="18" />
        Alterar senha }
      </button>
    </form>
    }
  </section>
</main>
