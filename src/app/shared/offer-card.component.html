<article
  class="offer-card"
  role="link"
  tabindex="0"
  (click)="open()"
  (keydown.enter)="open()"
  (keydown.space)="open($event)"
>
  <header class="offer-user">
    <span class="avatar mini"
      ><app-avatar
        [src]="offer().author.avatar"
        [alt]="'Avatar de ' + offer().author.name"
    /></span>
    <div>
      <strong>{{ offer().author.name }}</strong
      ><small>{{ offer().store }} · {{ offer().time }}</small>
    </div>
    <app-content-category-badge [category]="offer().category" /><button
      class="coupon-share-button"
      aria-label="Compartilhar oferta"
      (click)="share($event)"
    >
      <app-icon [name]="shared() ? 'check' : 'share'" [size]="16" />
    </button>
  </header>
  <div class="offer-main">
    <div class="offer-image">
      <img [src]="offer().image" [alt]="offer().title" /><span
        class="discount"
        >{{ offer().discount | discountLabel }}</span
      >
    </div>
    <div class="offer-body">
      <h2>{{ offer().title }}</h2>
      <p>{{ offer().description }}</p>
      <div class="offer-price-row">
        <div class="price">
          <small>{{ offer().oldPrice | brlCurrency }}</small
          ><strong>{{ offer().price | brlCurrency }}</strong>
        </div>
        <button
          class="fire-button"
          [class.active]="service.isVoted(offer().id, 'like')"
          (click)="vote($event, 'like')"
          aria-label="Curtir oferta"
        >
          <app-icon name="flame" [size]="16" /> {{ offer().likes }}
        </button>
      </div>
    </div>
  </div>
</article>
