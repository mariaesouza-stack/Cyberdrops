<div class="publication-option-tabs">
  <span>{{ label() }}</span>
  <div class="publication-option-tabs-list" role="tablist">
    @for (option of options(); track option.value) {
      <button
        type="button"
        role="tab"
        [class.active]="option.value === value()"
        [attr.aria-selected]="option.value === value()"
        (click)="changed.emit(option.value)"
      >
        {{ option.label }}
      </button>
    }
  </div>
</div>
