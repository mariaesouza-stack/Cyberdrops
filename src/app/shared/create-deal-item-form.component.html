<form class="publication-form" (ngSubmit)="submit()">
  <label
    >Nome do produto<input
      required
      name="title"
      [(ngModel)]="draft.title"
      placeholder="Ex.: Monitor Gamer 144Hz"
  /></label>
  <label
    >Loja<input
      required
      name="store"
      [(ngModel)]="draft.store"
      placeholder="Ex.: Kabum"
  /></label>
  <label
    >Link da oferta<input
      required
      type="url"
      name="url"
      [(ngModel)]="draft.url"
      placeholder="https://"
  /></label>
  <div class="publication-form-row">
    <label
      >Preço atual (R$)<input
        required
        min="0"
        step="0.01"
        type="number"
        name="price"
        [(ngModel)]="draft.price"
        placeholder="899,90" /></label
    ><label
      >Preço anterior (R$)<input
        required
        min="0"
        step="0.01"
        type="number"
        name="oldPrice"
        [(ngModel)]="draft.oldPrice"
        placeholder="1299,90"
    /></label>
  </div>
  <label
    >Categoria<select name="category" [(ngModel)]="draft.category">
      <option>Games</option>
      <option>Hardware</option>
      <option>Periféricos</option>
      <option>Consoles</option>
    </select></label
  >
  <div class="publication-upload-field">
    <span>Imagem do produto</span
    ><label class="publication-upload" [class.has-image]="draft.image">
      <input
        required
        type="file"
        accept="image/jpeg,image/png,image/webp"
        (change)="selectImage($event)"
      />
      @if (draft.image) {
        <img [src]="draft.image" alt="Prévia da imagem do produto" /><span
          class="publication-upload-action"
          ><app-icon name="image-up" [size]="18" />Trocar imagem</span
        >
      } @else {
        <app-icon name="image-up" [size]="28" /><b>Selecione uma imagem</b
        ><small>JPEG, PNG ou WebP de até 1 MB</small>
      }
    </label>
    @if (imageError()) {
      <small class="publication-upload-error">{{ imageError() }}</small>
    }
  </div>
  <label
    >Descrição curta<textarea
      required
      maxlength="160"
      name="description"
      [(ngModel)]="draft.description"
      placeholder="Destaque os principais detalhes da oferta"
    ></textarea>
  </label>
  <button class="button primary wide" type="submit">
    <app-icon name="send" [size]="17" />{{
      initial() ? "Salvar e reenviar" : "Enviar item em promoção"
    }}
  </button>
</form>
