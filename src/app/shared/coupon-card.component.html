<div class="coupon-card">
  <div>
    <small>CUPOM ATIVO</small><strong>{{ coupon().code }}</strong
    ><span>{{ coupon().description }}</span>
  </div>
  <button
    class="button secondary coupon-copy-button"
    [class.copied]="copied()"
    (click)="copy($event)"
  >
    <app-icon [name]="copied() ? 'check' : 'copy'" [size]="16" />{{
      copied() ? "Copiado!" : "Copiar"
    }}
  </button>
</div>
