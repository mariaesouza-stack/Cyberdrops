<header class="app-header">
  <a class="brand" routerLink="/home" aria-label="CyberDrops"
    ><img src="assets/logo.svg" alt="CyberDrops"
  /></a>
  <div class="header-actions">
    <a class="icon-button" routerLink="/search" aria-label="Buscar"
      ><app-icon name="search" [size]="20"
    /></a>
    <a
      class="icon-button notification-button"
      routerLink="/notifications"
      aria-label="Notificações"
      ><app-icon name="bell" [size]="20" /><app-notification-badge
        [count]="notifications.unreadCount()"
    /></a>
    <button
      class="icon-button"
      (click)="theme.toggle()"
      aria-label="Alternar tema"
    >
      <app-icon [name]="theme.isLight() ? 'moon' : 'sun'" [size]="20" />
    </button>
    <a class="avatar mini" routerLink="/profile" aria-label="Perfil"
      ><app-avatar
        [src]="user.user().avatar"
        [alt]="'Avatar de ' + user.user().name"
    /></a>
  </div>
</header>
