<article
  class="coupon-offer-card"
  [class.compact-copy]="compactCopy()"
  role="link"
  tabindex="0"
  (click)="open()"
  (keydown.enter)="open()"
  (keydown.space)="open($event)"
>
  <header>
    <span class="coupon-publisher-avatar"
      ><app-avatar
        [src]="offer().author.avatar"
        [alt]="'Avatar de ' + offer().author.name"
    /></span>
    <div>
      <strong>{{ offer().author.name }}</strong
      ><small>{{ offer().store }} · {{ offer().time }}</small>
    </div>
    <app-content-category-badge
      [category]="offer().category"
      [coupon]="true"
    /><span class="coupon-discount">{{
      offer().publicationDiscountLabel || (offer().discount | discountLabel)
    }}</span>
    @if (showShare()) {
      <button
        class="coupon-share-button"
        aria-label="Compartilhar cupom"
        (click)="share($event)"
      >
        <app-icon [name]="shared() ? 'check' : 'share'" [size]="16" />
      </button>
    }
  </header>
  <div class="coupon-offer-main">
    <div class="coupon-info">
      <b>{{ offer().coupon?.code }}</b>
      <p>{{ offer().coupon?.description || offer().description }}</p>
    </div>
    <div class="coupon-offer-actions">
      @if (showLike()) {
        <button
          class="fire-button"
          [class.active]="offerService.isVoted(offer().id, 'like')"
          aria-label="Curtir cupom"
          (click)="like($event)"
        >
          <app-icon name="flame" [size]="16" />{{ offer().likes }}
        </button>
      }
      <button
        class="coupon-copy-button"
        [attr.aria-label]="copied() ? 'Cupom copiado' : 'Copiar cupom'"
        (click)="copy($event)"
      >
        <app-icon [name]="copied() ? 'check' : 'copy'" [size]="16" />
        @if (!compactCopy()) {
          <span>{{ copied() ? "Copiado" : "Copiar cupom" }}</span>
        }
      </button>
    </div>
  </div>
</article>
